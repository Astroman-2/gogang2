apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthapp-backend
  labels:
    app: healthapp
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: healthapp
      tier: backend
  template:
    metadata:
      labels:
        app: healthapp
        tier: backend
    spec:
      containers:
      - name: backend
        image: healthapp-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MONGODB_URL
          valueFrom:
            configMapKeyRef:
              name: healthapp-config
              key: mongodb_url
        - name: DATABASE_NAME
          value: "healthapp"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: healthapp-secrets
              key: jwt_secret_key
        - name: ALGORITHM
          value: "HS256"
        - name: ACCESS_TOKEN_EXPIRE_MINUTES
          value: "30"
        - name: DEBUG
          value: "False"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Liveness Probe - Ensures container is alive
        livenessProbe:
          httpGet:
            path: /api/metrics/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        # Readiness Probe - Ensures container is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthapp-frontend
  labels:
    app: healthapp
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthapp
      tier: frontend
  template:
    metadata:
      labels:
        app: healthapp
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: healthapp-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        env:
        - name: VITE_API_URL
          valueFrom:
            configMapKeyRef:
              name: healthapp-config
              key: api_url
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app: healthapp
    tier: database
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: healthapp
      tier: database
  template:
    metadata:
      labels:
        app: healthapp
        tier: database
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
          name: mongodb
        env:
        - name: MONGO_INITDB_DATABASE
          value: "healthapp"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
