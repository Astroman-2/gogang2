apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: healthapp-backend-hpa
  labels:
    app: healthapp
    tier: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: healthapp-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: healthapp-frontend-hpa
  labels:
    app: healthapp
    tier: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: healthapp-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: healthapp-config
  labels:
    app: healthapp
data:
  mongodb_url: "mongodb://mongodb:27017"
  api_url: "https://api.healthapp.example.com"
  app_name: "HealthApp EMR & RCM"
  version: "1.0.0"
---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: healthapp-secrets
  labels:
    app: healthapp
type: Opaque
stringData:
  jwt_secret_key: "CHANGE-THIS-TO-SECURE-SECRET-IN-PRODUCTION"
  # In production, use Sealed Secrets or external secret management
