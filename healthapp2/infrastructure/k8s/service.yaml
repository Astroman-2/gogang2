apiVersion: v1
kind: Service
metadata:
  name: healthapp-backend
  labels:
    app: healthapp
    tier: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: healthapp
    tier: backend
---
apiVersion: v1
kind: Service
metadata:
  name: healthapp-frontend
  labels:
    app: healthapp
    tier: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: healthapp
    tier: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: healthapp
    tier: database
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: 27017
    targetPort: 27017
    protocol: TCP
    name: mongodb
  selector:
    app: healthapp
    tier: database
