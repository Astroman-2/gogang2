version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: healthapp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: healthapp
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - healthapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthapp-backend
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DATABASE_NAME: healthapp
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEBUG: "True"
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    networks:
      - healthapp-network
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthapp-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - healthapp-network
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0

networks:
  healthapp-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
