<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kandey Uttey | Sufi Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            color: #d4af37;
            font-family: 'Cinzel', serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Mist Animation Effect */
        .mist {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 1;
        }
        .main-card {
            position: relative;
            z-index: 2;
            margin: 40px 0;
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #d4af37;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center;
        }
        .hero-img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 2px solid #d4af37;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .lyrics-container {
            height: 120px;
            overflow: hidden;
            position: relative;
            margin: 30px 0;
            border-top: 1px double #d4af37;
            border-bottom: 1px double #d4af37;
        }
        .lyrics-scroll {
            position: absolute;
            width: 100%;
            animation: scroll-lyrics 25s linear infinite;
        }
        @keyframes scroll-lyrics {
            0% { top: 100%; }
            100% { top: -250%; }
        }
        .lyrics-text {
            font-size: 1.1em;
            line-height: 2;
            color: #f1e5ac;
        }
        .calligraphy-footer {
            font-family: 'Great Vibes', cursive;
            font-size: 4em;
            margin-top: 30px;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>
    <div class="mist"></div>
    <div class="main-card">
        <h1>Kandey Uttey</h1>
        <p style="color: #f1e5ac; letter-spacing: 2px;">Nusrat Fateh Ali Khan</p>
        
        
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" class="hero-img" alt="Majestic Horse">

        <div class="lyrics-container">
            <div class="lyrics-scroll">
                <p class="lyrics-text">
                    Kandey uttey meharaman ve...<br>
                    Asan vikhre painde te tur na sake...<br>
                    Tere ishq nachaya kar thaiya thaiya...<br>
                    Bulleshah asan marna naheen...<br>
                    Meri bukkal de vich chor...
                </p>
            </div>
        </div>

        <div class="calligraphy-footer">"Kandey uttey"</div>
    </div>
</body>
</html>
