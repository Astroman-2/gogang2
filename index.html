<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><script src='https://cdn.tailwindcss.com'></script><style>body{background:#050505; color:white; font-family:sans-serif;}.glass{background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); transition:0.3s;}.glass:hover{background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.2); transform: translateY(-5px);}</style></head><body class='p-10 md:p-24'><div class='max-w-6xl mx-auto'><header class='flex justify-between items-end mb-16'><div id='header-text'><h1 class='text-8xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-blue-600 italic uppercase tracking-tighter'>Gogang2</h1><p class='text-gray-500 tracking-[0.4em] text-xs'>AUTONOMOUS PROJECT ECOSYSTEM</p></div><button onclick='renderProjects()' class='px-10 py-4 bg-white text-black font-bold rounded-full hover:bg-emerald-500 hover:text-white transition-all shadow-2xl active:scale-95'>SHUFFLE APPS</button></header><div class='grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10' id='project-grid'></div></div><script>const apps=[{name:'LyricFlow',path:'client/index.html',desc:'AI Lyric-Image Blog Engine',status:'Stable'},{name:'Funtaztic9',path:'../funtaztic9/index.html',desc:'Dynamic Word Manifestation',status:'Active'},{name:'Registry',path:'prisma/schema.prisma',desc:'Database Architecture',status:'System'}];function renderProjects(){const grid=document.getElementById('project-grid');grid.innerHTML='';const shuffled=[...apps].sort(()=>0.5-Math.random());shuffled.forEach(app=>{const card=document.createElement('div');card.className='glass p-10 rounded-[2.5rem] cursor-pointer group';card.onclick=()=>window.location.href=app.path;card.innerHTML=`<div class='flex justify-between items-start mb-8'><span class='text-[10px] bg-white/10 px-3 py-1 rounded-full text-gray-400 font-bold tracking-widest uppercase'>${app.status}</span><div class='h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]'></div></div><h2 class='text-4xl font-bold mb-4 group-hover:text-emerald-400 transition-colors'>${app.name}</h2><p class='text-gray-500 leading-relaxed'>${app.desc}</p><div class='mt-10 text-xs font-black uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity'>Launch Module →</div>`;grid.appendChild(card);});}renderProjects();</script></body></html>
