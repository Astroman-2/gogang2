<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RC Interview — Interview Prep Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════ */
:root {
  --bg:#07090f;
  --surface:#0f1420;
  --surface2:#151d2e;
  --surface3:#1a2438;
  --border:#1e2d47;
  --border2:#253450;
  --accent:#00cfa8;
  --accent-dim:rgba(0,207,168,0.12);
  --accent2:#ff5c35;
  --accent3:#6d5fff;
  --gold:#f0b429;
  --text:#dde4f0;
  --text2:#8a9ab8;
  --text3:#4a5a78;
  --nav-h:58px;
  --panel-w:320px;
  --radius:10px;
  --transition:0.2s ease;
}

/* ══ RESET ══ */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;font-size:15px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
input,textarea{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

/* ══ TOPBAR ══ */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:var(--nav-h);
  background:rgba(7,9,15,0.94);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;
  padding:0 1.25rem;
}
.tb-brand{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:1.15rem;color:var(--accent);
  letter-spacing:-0.5px;white-space:nowrap;
  margin-right:1.5rem;
  display:flex;align-items:center;gap:0.5rem;
}
.tb-brand-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tb-jd-tabs{
  display:flex;gap:0.25rem;overflow-x:auto;
  scrollbar-width:none;flex:1;
}
.tb-jd-tabs::-webkit-scrollbar{display:none;}
.jd-tab{
  padding:0.35rem 1rem;border-radius:6px;
  font-size:0.78rem;font-weight:500;
  color:var(--text2);
  cursor:pointer;border:1px solid transparent;
  background:transparent;white-space:nowrap;
  transition:all var(--transition);
  display:flex;align-items:center;gap:0.4rem;
}
.jd-tab:hover{color:var(--text);background:var(--surface2);}
.jd-tab.active{
  color:var(--accent);
  background:var(--accent-dim);
  border-color:rgba(0,207,168,0.2);
}
.jd-tab .jd-tab-close{
  width:14px;height:14px;border-radius:50%;
  background:transparent;border:none;
  color:var(--text3);font-size:0.7rem;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.jd-tab .jd-tab-close:hover{background:rgba(255,92,53,0.2);color:var(--accent2);}
.tb-right{
  display:flex;align-items:center;gap:0.5rem;
  margin-left:auto;padding-left:1rem;
  border-left:1px solid var(--border);flex-shrink:0;
}
.btn-upload-jd{
  padding:0.4rem 1rem;
  border-radius:6px;border:1px dashed var(--border2);
  background:transparent;color:var(--text2);
  font-size:0.75rem;font-weight:600;
  transition:all var(--transition);
  display:flex;align-items:center;gap:0.35rem;
}
.btn-upload-jd:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.tb-progress-chip{
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;color:var(--accent);
  background:var(--accent-dim);
  border:1px solid rgba(0,207,168,0.2);
  border-radius:20px;padding:0.3rem 0.75rem;
  white-space:nowrap;
}

/* ══ LAYOUT ══ */
#app-layout{
  display:flex;
  padding-top:var(--nav-h);
  min-height:100vh;
}

/* ══ LEFT SIDEBAR (section nav) ══ */
#sidebar{
  width:220px;flex-shrink:0;
  border-right:1px solid var(--border);
  position:sticky;top:var(--nav-h);
  height:calc(100vh - var(--nav-h));
  overflow-y:auto;
  background:var(--surface);
  padding:1.25rem 0;
  transition:transform 0.3s;
}
.sidebar-section-label{
  font-family:'JetBrains Mono',monospace;
  font-size:0.62rem;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text3);
  padding:0.6rem 1.25rem 0.35rem;
}
.sidebar-item{
  display:flex;align-items:center;gap:0.6rem;
  padding:0.55rem 1.25rem;
  font-size:0.8rem;color:var(--text2);
  cursor:pointer;
  border-left:2px solid transparent;
  transition:all var(--transition);
  position:relative;
}
.sidebar-item:hover{color:var(--text);background:var(--surface2);}
.sidebar-item.active{
  color:var(--accent);
  background:var(--accent-dim);
  border-left-color:var(--accent);
}
.sidebar-item-icon{font-size:0.9rem;width:18px;text-align:center;flex-shrink:0;}
.sidebar-item-check{
  margin-left:auto;width:14px;height:14px;
  border-radius:50%;border:1.5px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:0.55rem;
  transition:all var(--transition);
}
.sidebar-item-check.done{
  background:var(--accent);border-color:var(--accent);color:#07090f;font-weight:900;
}
.sidebar-sub{
  padding-left:2.5rem;
}
.sidebar-sub .sidebar-item{
  font-size:0.75rem;padding:0.4rem 1.25rem 0.4rem 0;
}

/* ══ MAIN CONTENT ══ */
#main{
  flex:1;min-width:0;
  padding:2rem 2rem 4rem;
  max-width:900px;
}

/* ══ RIGHT PANEL (completed items) ══ */
#right-panel{
  width:var(--panel-w);flex-shrink:0;
  border-left:1px solid var(--border);
  position:sticky;top:var(--nav-h);
  height:calc(100vh - var(--nav-h));
  overflow-y:auto;
  background:var(--surface);
  padding:1.25rem;
  transition:transform 0.3s;
}
.rp-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;
  padding-bottom:0.85rem;
  border-bottom:1px solid var(--border);
}
.rp-title{
  font-family:'Fraunces',serif;
  font-size:0.95rem;font-weight:600;
  color:var(--text);
}
.rp-count{
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;color:var(--accent);
  background:var(--accent-dim);
  border-radius:20px;padding:0.15rem 0.55rem;
  border:1px solid rgba(0,207,168,0.2);
}
.rp-empty{
  text-align:center;padding:2rem 1rem;
  color:var(--text3);font-size:0.78rem;
  line-height:1.6;
}
.rp-empty-icon{font-size:2rem;margin-bottom:0.5rem;}
.completed-item{
  display:flex;align-items:flex-start;gap:0.6rem;
  padding:0.65rem 0.75rem;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;margin-bottom:0.5rem;
  animation:slideFromRight 0.3s ease;
  position:relative;
}
@keyframes slideFromRight{
  from{opacity:0;transform:translateX(20px)}
  to{opacity:1;transform:translateX(0)}
}
.completed-item-icon{
  width:22px;height:22px;border-radius:6px;
  background:rgba(0,207,168,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;flex-shrink:0;color:var(--accent);
  font-weight:900;
}
.completed-item-body{flex:1;min-width:0;}
.completed-item-label{
  font-size:0.76rem;font-weight:500;
  color:var(--text);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.completed-item-section{
  font-size:0.66rem;color:var(--text3);margin-top:0.15rem;
}
.completed-item-undo{
  background:transparent;border:none;
  color:var(--text3);font-size:0.7rem;
  padding:0.15rem;cursor:pointer;
  transition:color var(--transition);flex-shrink:0;
}
.completed-item-undo:hover{color:var(--accent2);}
.rp-clear-btn{
  width:100%;margin-top:0.75rem;
  padding:0.5rem;border-radius:6px;
  background:transparent;border:1px solid var(--border);
  color:var(--text3);font-size:0.74rem;
  transition:all var(--transition);
}
.rp-clear-btn:hover{border-color:var(--accent2);color:var(--accent2);}

/* ══ HERO SECTION ══ */
.page-hero{
  background:linear-gradient(135deg,#0a1020,#0f1830);
  border:1px solid var(--border);
  border-radius:14px;padding:2rem 2.5rem;
  margin-bottom:2rem;position:relative;overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 75% 40%,rgba(0,207,168,0.07) 0%,transparent 65%);
  pointer-events:none;
}
.hero-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;color:var(--accent);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:0.6rem;
}
.hero-title{
  font-family:'Fraunces',serif;
  font-size:1.9rem;font-weight:900;
  line-height:1.15;color:var(--text);
}
.hero-sub{
  font-size:0.82rem;color:var(--text2);
  margin-top:0.45rem;line-height:1.6;
}
.hero-chips{display:flex;gap:0.6rem;flex-wrap:wrap;margin-top:1rem;}
.hero-chip{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:20px;padding:0.25rem 0.75rem;
  font-size:0.72rem;color:var(--text2);
}
.hero-chip strong{color:var(--text);}

/* ══ SECTION TITLES ══ */
.sec-title{
  font-family:'Fraunces',serif;
  font-size:1.2rem;font-weight:600;
  color:var(--text);margin-bottom:0.2rem;
}
.sec-divider{
  width:32px;height:2px;border-radius:2px;
  background:var(--accent);margin-bottom:1.25rem;
  margin-top:0.35rem;
}
.sec-sub{font-size:0.78rem;color:var(--text2);margin-bottom:1.25rem;}

/* ══ CLICKABLE TOPIC CARDS ══ */
.topic-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:0.85rem;margin-bottom:2rem;
}
.topic-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.1rem 1.25rem;
  cursor:pointer;
  transition:all var(--transition);
  display:flex;flex-direction:column;gap:0.4rem;
  position:relative;overflow:hidden;
}
.topic-card::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:2px;
  background:var(--accent);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.25s ease;
}
.topic-card:hover{border-color:rgba(0,207,168,0.3);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.3);}
.topic-card:hover::after{transform:scaleX(1);}
.topic-card.done{
  border-color:rgba(0,207,168,0.25);
  background:rgba(0,207,168,0.04);
}
.topic-card.done::after{transform:scaleX(1);background:var(--accent);}
.tc-icon{font-size:1.3rem;margin-bottom:0.2rem;}
.tc-title{font-size:0.88rem;font-weight:600;color:var(--text);line-height:1.3;}
.tc-sub{font-size:0.72rem;color:var(--text2);line-height:1.4;}
.tc-arrow{
  margin-top:auto;font-size:0.72rem;color:var(--text3);
  display:flex;align-items:center;gap:0.3rem;
  transition:color var(--transition);
}
.topic-card:hover .tc-arrow{color:var(--accent);}
.tc-done-badge{
  position:absolute;top:0.6rem;right:0.6rem;
  background:var(--accent);color:#07090f;
  font-size:0.6rem;font-weight:900;
  border-radius:20px;padding:0.15rem 0.45rem;
}

/* ══ STAT GRID ══ */
.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:0.75rem;margin-bottom:2rem;
}
.stat-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem;text-align:center;
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:3px;
}
.stat-card.teal::before{background:var(--accent);}
.stat-card.orange::before{background:var(--accent2);}
.stat-card.purple::before{background:var(--accent3);}
.stat-card.gold::before{background:var(--gold);}
.stat-icon{font-size:1.4rem;margin-bottom:0.35rem;}
.stat-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.stat-value{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:700;color:var(--text);margin:0.2rem 0;}
.stat-desc{font-size:0.69rem;color:var(--text2);line-height:1.4;}

/* ══ DETAIL PAGE (sub-page opened from topic card) ══ */
#detail-overlay{
  display:none;
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  padding-top:var(--nav-h);
  overflow-y:auto;
}
#detail-overlay.open{display:flex;flex-direction:column;}
#detail-page{
  background:var(--bg);
  min-height:calc(100vh - var(--nav-h));
  width:100%;
  animation:slideUp 0.3s ease;
  display:flex;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
#detail-sidebar{
  width:260px;flex-shrink:0;
  border-right:1px solid var(--border);
  position:sticky;top:0;
  height:calc(100vh - var(--nav-h));
  overflow-y:auto;
  background:var(--surface);
  padding:1.5rem 0;
}
.detail-sidebar-header{
  padding:0 1.25rem 1rem;
  border-bottom:1px solid var(--border);
  margin-bottom:0.75rem;
}
.detail-sidebar-back{
  display:flex;align-items:center;gap:0.5rem;
  font-size:0.76rem;color:var(--text2);
  cursor:pointer;margin-bottom:0.75rem;
  transition:color var(--transition);
}
.detail-sidebar-back:hover{color:var(--accent);}
.detail-sidebar-title{
  font-family:'Fraunces',serif;
  font-size:1rem;font-weight:600;color:var(--text);
  line-height:1.3;
}
.detail-sidebar-subtitle{
  font-size:0.72rem;color:var(--text2);margin-top:0.2rem;
}
.detail-nav-item{
  display:flex;align-items:center;gap:0.6rem;
  padding:0.5rem 1.25rem;
  font-size:0.78rem;color:var(--text2);
  cursor:pointer;border-left:2px solid transparent;
  transition:all var(--transition);
}
.detail-nav-item:hover{color:var(--text);background:var(--surface2);}
.detail-nav-item.active{
  color:var(--accent);
  background:var(--accent-dim);
  border-left-color:var(--accent);
}
.detail-nav-item-check{
  margin-left:auto;width:14px;height:14px;
  border-radius:50%;border:1.5px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:0.55rem;
}
.detail-nav-item-check.done{
  background:var(--accent);border-color:var(--accent);
  color:#07090f;font-weight:900;
}
#detail-main{
  flex:1;min-width:0;
  padding:2rem 2.5rem 4rem;
  max-width:750px;
}
.detail-section{display:none;}
.detail-section.active{display:block;}

/* ══ CHECKLIST ITEMS ══ */
.checklist-block{margin-bottom:1.5rem;}
.cl-group-title{
  font-family:'JetBrains Mono',monospace;
  font-size:0.62rem;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text3);
  margin-bottom:0.6rem;padding-left:0.25rem;
}
.cl-item{
  display:flex;align-items:flex-start;gap:0.75rem;
  padding:0.7rem 0.9rem;
  border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);
  margin-bottom:0.4rem;cursor:pointer;
  transition:all var(--transition);
  position:relative;
}
.cl-item:hover{border-color:rgba(0,207,168,0.25);background:rgba(0,207,168,0.03);}
.cl-item.checked{
  background:rgba(0,207,168,0.04);
  border-color:rgba(0,207,168,0.2);
}
.cl-item.checked .cl-label{text-decoration:line-through;color:var(--text3);}
.cl-box{
  width:18px;height:18px;border-radius:5px;
  border:2px solid var(--border2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;transition:all var(--transition);
}
.cl-item.checked .cl-box{
  background:var(--accent);border-color:var(--accent);color:#07090f;
}
.cl-checkmark{font-size:0.6rem;font-weight:900;display:none;}
.cl-item.checked .cl-checkmark{display:block;}
.cl-label{font-size:0.83rem;color:var(--text);line-height:1.4;}
.cl-sub{font-size:0.72rem;color:var(--text2);margin-top:0.2rem;line-height:1.4;}
.cl-send-badge{
  margin-left:auto;font-size:0.62rem;
  background:var(--accent-dim);border:1px solid rgba(0,207,168,0.2);
  border-radius:20px;padding:0.12rem 0.45rem;
  color:var(--accent);white-space:nowrap;flex-shrink:0;
  display:none;
}
.cl-item.checked .cl-send-badge{display:block;}

/* ══ FILE UPLOAD ZONE ══ */
.upload-zone{
  border:2px dashed var(--border2);
  border-radius:12px;padding:2rem;
  text-align:center;cursor:pointer;
  transition:all var(--transition);
  margin-bottom:1.5rem;
  background:var(--surface2);
  position:relative;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--accent);
  background:rgba(0,207,168,0.04);
}
.upload-zone-icon{font-size:2rem;margin-bottom:0.5rem;}
.upload-zone-title{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:0.25rem;}
.upload-zone-sub{font-size:0.75rem;color:var(--text2);}
.upload-zone input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
}
.upload-result{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:1rem;margin-bottom:1rem;
}
.upload-result-title{
  font-size:0.78rem;font-weight:600;color:var(--accent);
  margin-bottom:0.5rem;
  display:flex;align-items:center;gap:0.35rem;
}

/* ══ CONTENT CARDS ══ */
.content-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.25rem;margin-bottom:1rem;
}
.content-card-title{
  font-family:'Fraunces',serif;
  font-size:0.95rem;font-weight:600;
  color:var(--text);margin-bottom:0.5rem;
  display:flex;align-items:center;gap:0.5rem;
}
.content-card-body{
  font-size:0.82rem;color:var(--text2);
  line-height:1.65;
}
.content-card-body ul{padding-left:1.25rem;}
.content-card-body li{margin-bottom:0.35rem;}
.content-card-body strong{color:var(--text);}

/* ══ ARTICLE LINKS ══ */
.article-link{
  display:flex;align-items:flex-start;gap:0.75rem;
  padding:0.85rem 1rem;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;margin-bottom:0.5rem;
  transition:all var(--transition);cursor:pointer;
  text-decoration:none;
}
.article-link:hover{
  border-color:rgba(0,207,168,0.25);
  transform:translateX(3px);
  text-decoration:none;
}
.al-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent-dim);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;flex-shrink:0;
}
.al-title{font-size:0.8rem;font-weight:600;color:var(--text);line-height:1.3;}
.al-src{font-size:0.68rem;color:var(--text3);margin-top:0.2rem;}

/* ══ FLASHCARDS ══ */
.fc-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:0.85rem;margin-bottom:1.5rem;
}
.fc-card{
  perspective:700px;height:150px;cursor:pointer;
}
.fc-inner{
  position:relative;width:100%;height:100%;

.mcq-opt.correct{border-color:var(--accent);background:rgba(0,207,168,0.1);color:var(--accent);}
.mcq-opt.wrong{border-color:var(--accent2);background:rgba(255,92,53,0.08);color:var(--accent2);}
.mcq-opt.disabled{pointer-events:none;opacity:0.55;}
.mcq-opt-l{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:700;flex-shrink:0;
}
.mcq-exp{
  margin-top:0.85rem;padding:0.85rem;
  background:rgba(0,207,168,0.06);
  border:1px solid rgba(0,207,168,0.15);
  border-radius:8px;font-size:0.78rem;
  color:var(--text);line-height:1.55;display:none;
}
.mcq-footer{
  display:flex;justify-content:space-between;
  align-items:center;margin-top:1rem;
}
.mcq-score{
  font-family:'JetBrains Mono',monospace;
  font-size:0.75rem;color:var(--text2);
}

/* ══ BUTTONS ══ */
.btn{

  font-size:0.79rem;font-weight:600;

  border:none;
}
.btn-primary{background:var(--accent);color:#07090f;}
.btn-primary:hover{background:#00efc4;}
.btn-ghost{

}
.btn-ghost:hover{border-color:var(--text);color:var(--text);}
.btn-sm{padding:0.35rem 0.85rem;font-size:0.72rem;}
.btn-danger-ghost{

  border:1px solid var(--border);color:var(--text3);
}

  display:grid;

}
.skill-track{
  height:4px;background:var(--border);

}
.skill-fill{

}
.skill-tags{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.5rem;}
.skill-tag{

  border-radius:3px;background:rgba(0,0,0,0.3);

}

.accordion-body ul{padding-left:1.2rem;}
.accordion-body li{margin-bottom:0.35rem;}
.accordion-body strong{color:var(--accent);}

.flow-title{font-size:0.75rem;font-weight:600;color:var(--text);}
.flow-sub{font-size:0.65rem;color:var(--text2);margin-top:0.15rem;}
.flow-arrow{

/* ══ RESOURCE TABLE ══ */
.res-table{width:100%;border-collapse:collapse;margin-bottom:1.5rem;font-size:0.79rem;}

  font-size:0.62rem;text-transform:uppercase;
  letter-spacing:1px;color:var(--text3);
}

}
.res-table tr:hover td{background:rgba(0,207,168,0.02);}
.res-table a{color:var(--accent);}
.res-badge{

.rb-free{background:rgba(0,207,168,0.08);color:var(--accent);border:1px solid rgba(0,207,168,0.2);}
.rb-paid{background:rgba(255,92,53,0.08);color:var(--accent2);border:1px solid rgba(255,92,53,0.2);}

.overview-progress-bar{
  background:var(--surface2);border:1px solid var(--border);

}

.opb-ring{width:80px;height:80px;}
.opb-ring circle{fill:none;stroke-width:6;}
.opb-ring .ring-bg{stroke:var(--border);}
.opb-ring .ring-fill{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 0.5s;}
.opb-label{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:900;fill:var(--accent);}

/* ══ NOTIFY TOAST ══ */
#toast{

/* ════════════════════════════════
   JD PARSER (for uploaded JDs)
════════════════════════════════ */
function parseJDText(rawText, name) {
  const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);
  const sections = [];
  let currentSection = null;
  const sectionPatterns = [
    /what you will do/i,
    /responsibilities/i,
    /requirements/i,
    /what we.?re looking for/i,
    /preferred qualifications?/i,
    /qualifications?/i,
    /about the role/i,
    /skills/i,
    /experience/i,
  ];

  lines.forEach(line => {
    const isHeading = sectionPatterns.some(p => p.test(line)) && line.length < 80;
    if (isHeading) {
      if (currentSection && currentSection.items.length > 0) sections.push(currentSection);
      currentSection = { title: line.replace(/[*•:]/g, '').trim(), items: [] };
    } else if (currentSection) {
      const cleaned = line.replace(/^[•\-\*\d\.\)]+\s*/, '').trim();
      if (cleaned.length > 8 && cleaned.length < 250) {
        currentSection.items.push(cleaned);
      }
    }
  });
  if (currentSection && currentSection.items.length > 0) sections.push(currentSection);

  // Build a JD object
  const jdSections = sections.map((sec, si) => {
    const icons = ['📋','🎯','⭐','📊','🔧','💡','🏢','⚙️'];
    return {
      id: 'sec-' + si,
      icon: icons[si % icons.length],
      label: sec.title,
      type: 'dynamic',
      checklist: sec.items.map((item, ii) => ({
        id: `dyn-${si}-${ii}`,
        label: item,
        sub: 'Review and prepare for interview'
      }))
    };
  });

  return {
    id: 'jd-' + Date.now(),
    name: name || 'New JD',
    role: name || 'Role',
    company: name || 'Company',
    location: 'Uploaded JD',
    chips: [{ label: 'Source', value: 'Uploaded' }],
    sections: [
      { id: 'overview', icon: '🏠', label: 'Overview', type: 'overview' },
      ...jdSections
    ]
  };
}

════════════════════════════════ */
DB.jds.push(RC_JD);
DB.activeJD = RC_JD.id;

function init() {
  renderJDTabs();
  renderSidebar();
  renderMain();
  updateProgress();
  renderRightPanel();
}

/* ════════════════════════════════
   JD TABS
════════════════════════════════ */
function renderJDTabs() {
  const container = document.getElementById('jd-tabs-container');
  container.innerHTML = DB.jds.map(jd => `
    <button class="jd-tab ${jd.id === DB.activeJD ? 'active' : ''}"
            onclick="switchJD('${jd.id}')">
      ${jd.name}
      ${DB.jds.length > 1 ? `<span class="jd-tab-close" onclick="removeJD(event,'${jd.id}')">✕</span>` : ''}
    </button>
  `).join('');
}

function switchJD(id) {
  DB.activeJD = id;
  renderJDTabs();
  renderSidebar();
  renderMain('overview');
  updateProgress();
}

function removeJD(e, id) {
  e.stopPropagation();
  DB.jds = DB.jds.filter(j => j.id !== id);
  if (DB.activeJD === id) DB.activeJD = DB.jds[0]?.id;
  renderJDTabs();
  renderSidebar();
  renderMain();
}

function getActiveJD() {
  return DB.jds.find(j => j.id === DB.activeJD);
}

/* ════════════════════════════════
   SIDEBAR
════════════════════════════════ */
let activeSectionId = 'overview';

function renderSidebar() {
  const jd = getActiveJD();
  if (!jd) return;
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `
    <div class="sidebar-section-label">Sections</div>
    ${jd.sections.map(sec => {
      const total = getSectionChecklist(sec).length;
      const done = getSectionChecklist(sec).filter(i => DB.completed[i.id]).length;
      const isDone = total > 0 && done === total;
      return `
        <div class="sidebar-item ${sec.id === activeSectionId ? 'active' : ''}"
             onclick="navigateTo('${sec.id}')">
          <span class="sidebar-item-icon">${sec.icon}</span>
          <span style="flex:1">${sec.label}</span>
          <div class="sidebar-item-check ${isDone ? 'done' : ''}">${isDone ? '✓' : ''}</div>
        </div>
      `;
    }).join('')}
  `;
}

function getSectionChecklist(sec) {
  if (sec.type === 'requirements') return sec.checklist || [];
  if (sec.type === 'dynamic') return sec.checklist || [];
  if (sec.type === 'topics' || sec.type === 'preferred') {
    return (sec.topics || []).flatMap(t => (t.sections || []).flatMap(s => s.checklist || []));
  }
  return [];
}

function navigateTo(sectionId) {
  activeSectionId = sectionId;
  renderSidebar();
  renderMain(sectionId);
  window.scrollTo(0, 0);
}

/* ════════════════════════════════
   MAIN CONTENT RENDERER
════════════════════════════════ */
function renderMain(sectionId) {
  activeSectionId = sectionId || activeSectionId;
  const jd = getActiveJD();
  if (!jd) return;
  const section = jd.sections.find(s => s.id === activeSectionId) || jd.sections[0];
  activeSectionId = section.id;

  const main = document.getElementById('main');

  if (section.type === 'overview') {
    main.innerHTML = renderOverviewPage(jd);
  } else if (section.type === 'topics') {
    main.innerHTML = renderTopicsPage(section, jd);
  } else if (section.type === 'requirements') {
    main.innerHTML = renderRequirementsPage(section, jd);
  } else if (section.type === 'preferred') {
    main.innerHTML = renderPreferredPage(section, jd);
  } else if (section.type === 'dynamic') {
    main.innerHTML = renderDynamicPage(section, jd);
  }

  // Re-attach checklist listeners
  attachChecklistListeners();
  // Re-init MCQ if present
  if (window.mcqState) resetMCQDisplay();
}

function renderChecklistItem(item, sectionLabel) {
  const isDone = !!DB.completed[item.id];
  return `
    <div class="cl-item ${isDone ? 'checked' : ''}"
         data-id="${item.id}"
         data-label="${escapeAttr(item.label)}"
         data-section="${escapeAttr(sectionLabel || '')}"
         onclick="toggleChecklist(this)">
      <div class="cl-box"><span class="cl-checkmark">✓</span></div>
      <div>
        <div class="cl-label">${item.label}</div>
        ${item.sub ? `<div class="cl-sub">${item.sub}</div>` : ''}
      </div>
      <div class="cl-send-badge">→ Panel</div>
    </div>
  `;
}

function escapeAttr(str) {
  return (str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function attachChecklistListeners() {
  // Already handled via inline onclick
}

function toggleChecklist(el) {
  const id = el.dataset.id;
  const label = el.dataset.label;
  const section = el.dataset.section;

  if (DB.completed[id]) {
    delete DB.completed[id];
    el.classList.remove('checked');
    removeFromPanel(id);
  } else {
    DB.completed[id] = { label, section, ts: Date.now() };
    el.classList.add('checked');
    addToPanel(id, label, section);
  }
  DB.save();
  updateProgress();
  renderSidebar();
  showToast(DB.completed[id] ? '✓ Moved to completed panel' : '↩ Removed from completed');
}

/* ════════════════════════════════
   RIGHT PANEL
════════════════════════════════ */
function addToPanel(id, label, section) {
  const list = document.getElementById('rp-list');
  const empty = list.querySelector('.rp-empty');
  if (empty) list.innerHTML = '';

  const el = document.createElement('div');
  el.className = 'completed-item';
  el.id = 'rp-' + id;
  el.innerHTML = `
    <div class="completed-item-icon">✓</div>
    <div class="completed-item-body">
      <div class="completed-item-label">${label}</div>
      <div class="completed-item-section">${section}</div>
    </div>
    <button class="completed-item-undo" onclick="undoComplete('${id}')" title="Undo">↩</button>
  `;
  list.prepend(el);
  updateRPCount();
}

function removeFromPanel(id) {
  const el = document.getElementById('rp-' + id);
  if (el) el.remove();
  const list = document.getElementById('rp-list');
  if (!list.children.length) {
    list.innerHTML = '<div class="rp-empty"><div class="rp-empty-icon">📋</div>Check off items to move them here</div>';
  }
  updateRPCount();
}

function undoComplete(id) {
  delete DB.completed[id];
  DB.save();
  removeFromPanel(id);
  // Uncheck in DOM if visible
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.remove('checked');
  updateProgress();
  renderSidebar();
  showToast('↩ Item restored');
}

function clearCompleted() {
  if (!confirm('Clear all completed items?')) return;
  DB.completed = {};
  DB.save();
  renderRightPanel();
  document.querySelectorAll('.cl-item.checked').forEach(el => el.classList.remove('checked'));
  updateProgress();
  renderSidebar();
  renderMain(activeSectionId);
}

function renderRightPanel() {
  const list = document.getElementById('rp-list');
  const entries = Object.entries(DB.completed);
  if (!entries.length) {
    list.innerHTML = '<div class="rp-empty"><div class="rp-empty-icon">📋</div>Check off items to move them here</div>';
  } else {
    list.innerHTML = entries.map(([id, val]) => `
      <div class="completed-item" id="rp-${id}">
        <div class="completed-item-icon">✓</div>
        <div class="completed-item-body">
          <div class="completed-item-label">${val.label}</div>
          <div class="completed-item-section">${val.section}</div>
        </div>
        <button class="completed-item-undo" onclick="undoComplete('${id}')" title="Undo">↩</button>
      </div>
    `).reverse().join('');
  }
  updateRPCount();
}

function updateRPCount() {
  const count = Object.keys(DB.completed).length;
  document.getElementById('rp-count').textContent = count;
  document.getElementById('rp-clear-btn').style.display = count > 0 ? 'block' : 'none';
}

function updateProgress() {
  const jd = getActiveJD();
  if (!jd) return;
  const allItems = jd.sections.flatMap(s => getSectionChecklist(s));
  const total = allItems.length;
  const done = allItems.filter(i => DB.completed[i.id]).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('tb-progress-chip').textContent = `${pct}% Ready`;
  updateRPCount();
}

/* ════════════════════════════════
   FILE HANDLING
════════════════════════════════ */
function handleFileDrop(e, zoneId, context) {
  e.preventDefault();
  document.getElementById('uz-' + zoneId)?.classList.remove('dragover');
  const file = e.dataTransfer?.files?.[0];
  if (file) processFile(file, zoneId, context);
}

function handleFileSelect(e, zoneId, context) {
  const file = e.target.files?.[0];
  if (file) processFile(file, zoneId, context);
}

function processFile(file, zoneId, context) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const items = extractChecklistFromText(text, file.name);
    renderUploadResult(zoneId, file.name, items, context);
  };
  // Read as text (works for txt, md; will get garbled for PDF but extracts some text)
  reader.readAsText(file);
}

function extractChecklistFromText(text, filename) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const items = [];

  lines.forEach(line => {
    // Strip bullet points, numbers, markdown headers
    const cleaned = line
      .replace(/^#+\s*/, '')
      .replace(/^[•\-\*\d\.\)]+\s*/, '')
      .replace(/\*\*/g, '')
      .trim();

    if (cleaned.length >= 10 && cleaned.length <= 300) {
      // Filter out lines that look like headers (all caps, very short)
      const isLikelyBullet = /[a-z]/.test(cleaned) || cleaned.length > 30;
      if (isLikelyBullet) {
        items.push(cleaned);
      }
    }
  });

  // Deduplicate
  return [...new Set(items)].slice(0, 25); // max 25 items
}

function renderUploadResult(zoneId, filename, items, context) {
  const resultEl = document.getElementById('upload-result-' + zoneId);
  if (!resultEl) return;

  if (!items.length) {
    resultEl.innerHTML = `<div class="upload-result"><div class="upload-result-title">⚠️ No items extracted from ${filename}</div><p style="font-size:0.76rem;color:var(--text2);">Try a plain text or markdown file with bullet points.</p></div>`;
    return;
  }

  const tempItems = items.map((item, i) => ({
    id: `uploaded-${zoneId}-${i}-${Date.now()}`,
    label: item,
    sub: `From: ${filename}`,
    _temp: true
  }));

  resultEl.innerHTML = `
    <div class="upload-result">
      <div class="upload-result-title">✓ Extracted ${items.length} items from "${filename}"</div>
      <p style="font-size:0.74rem;color:var(--text2);margin-bottom:0.85rem;">Click items to add to your completed panel, or add all at once.</p>
      <div class="checklist-block">
        ${tempItems.map(item => renderChecklistItem(item, `Uploaded: ${filename}`)).join('')}
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
        <button class="btn btn-primary btn-sm" onclick="checkAllUploadedItems('${zoneId}','${filename}')">Check All →</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('upload-result-${zoneId}').innerHTML=''">Clear</button>
      </div>
    </div>
  `;
}

function checkAllUploadedItems(zoneId, filename) {
  const resultEl = document.getElementById('upload-result-' + zoneId);
  if (!resultEl) return;
  resultEl.querySelectorAll('.cl-item:not(.checked)').forEach(el => toggleChecklist(el));
}

function resetMCQState() {
  window.mcqState = { current: 0, score: 0, answered: {} };

function renderMCQCard() {
  const mcqs = window.currentMCQs || [];
  if (!mcqs.length) return;
  const s = window.mcqState;
  const q = mcqs[s.current];

  const pct = (s.current / mcqs.length) * 100;
  const pfEl = document.getElementById('mcq-pf');
  if (pfEl) pfEl.style.width = pct + '%';

  const scoreEl = document.getElementById('mcq-score-label');
  if (scoreEl) scoreEl.textContent = `Score: ${s.score}/${mcqs.length}`;

  const wrap = document.getElementById('mcq-card-wrap');
  if (!wrap) return;

  wrap.innerHTML = `
    <div class="mcq-card">
      <div class="mcq-counter">Question ${s.current + 1} of ${mcqs.length}</div>
      <div class="mcq-q">${q.q}</div>
      <div class="mcq-opts">
        ${q.opts.map((o, i) => `
          <div class="mcq-opt ${s.answered[s.current] !== undefined ? (i === q.ans ? 'correct' : i === s.answered[s.current] ? 'wrong' : 'disabled') : ''}"
               id="mopt-${i}"
               onclick="selectMCQ(${i})">
            <div class="mcq-opt-l">${String.fromCharCode(65+i)}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="mcq-exp" id="mcq-exp-txt" style="${s.answered[s.current] !== undefined ? 'display:block' : 'display:none'}">${q.exp}</div>
    </div>
    <div class="mcq-footer">
      <div></div>
      ${s.answered[s.current] !== undefined && s.current < mcqs.length - 1
        ? `<button class="btn btn-primary btn-sm" onclick="nextMCQ()">Next →</button>`
        : s.answered[s.current] !== undefined && s.current === mcqs.length - 1
        ? `<button class="btn btn-ghost btn-sm" onclick="resetMCQState();renderMCQCard()">↺ Restart</button>`
        : ''}
    </div>
  `;
}

function selectMCQ(i) {
  const s = window.mcqState;
  const mcqs = window.currentMCQs || [];
  if (s.answered[s.current] !== undefined) return;
  s.answered[s.current] = i;
  if (i === mcqs[s.current].ans) s.score++;
  renderMCQCard();
}

function nextMCQ() {
  window.mcqState.current++;
  renderMCQCard();
}

function resetMCQDisplay() {
  resetMCQState();
  renderMCQCard();
}

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ════════════════════════════════
   RUN
════════════════════════════════ */
init();

// Render MCQ after DOM is ready (deferred)
setTimeout(() => {
  if (activeSectionId === 'looking-for') renderMCQCard();
}, 100);
</script>
</body>
</html>
